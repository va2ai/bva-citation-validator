<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citation Validator — BVA Legal Intelligence</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2332;
    --border: #1e2d3d;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --purple: #a78bfa;
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .header p { font-size: 12px; color: var(--text2); }
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    background: rgba(59,130,246,0.15);
    color: var(--accent);
    border: 1px solid rgba(59,130,246,0.3);
    margin-left: 12px;
    vertical-align: middle;
  }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }

  /* Query panel */
  .query-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .query-panel label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .query-panel textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 12px;
    border-radius: 4px;
    resize: vertical;
    min-height: 60px;
  }
  .query-panel textarea:focus { outline: none; border-color: var(--accent); }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; margin-top: 16px; }
  .btn {
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-grounded {
    background: rgba(34,197,94,0.1);
    color: var(--green);
    border-color: rgba(34,197,94,0.3);
  }
  .btn-grounded:hover:not(:disabled) { background: rgba(34,197,94,0.2); }
  .btn-ungrounded {
    background: rgba(239,68,68,0.1);
    color: var(--red);
    border-color: rgba(239,68,68,0.3);
  }
  .btn-ungrounded:hover:not(:disabled) { background: rgba(239,68,68,0.2); }
  .btn-both {
    background: rgba(59,130,246,0.1);
    color: var(--accent);
    border-color: rgba(59,130,246,0.3);
  }
  .btn-both:hover:not(:disabled) { background: rgba(59,130,246,0.2); }

  /* Results grid */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
  }
  .results-grid.single { grid-template-columns: 1fr; }

  /* Result panel */
  .result-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .result-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-header h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .result-header.grounded h2 { color: var(--green); }
  .result-header.ungrounded h2 { color: var(--red); }

  /* Steps */
  .step {
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .step:last-child { border-bottom: none; }
  .step-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--text2);
  }

  /* Sources */
  .source-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .source-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  /* Response text */
  .response-text {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    max-height: 300px;
    overflow-y: auto;
    padding: 12px;
    background: var(--bg);
    border-radius: 4px;
    white-space: pre-wrap;
  }

  /* Citation results */
  .citation {
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 4px;
    background: var(--bg);
    border-left: 3px solid var(--border);
    font-size: 12px;
  }
  .citation.VERIFIED { border-left-color: var(--green); }
  .citation.HALLUCINATED { border-left-color: var(--red); }
  .citation.UNGROUNDED { border-left-color: var(--purple); }
  .citation.NOT_IN_SOURCES { border-left-color: var(--amber); }
  .citation.OUTDATED { border-left-color: var(--orange); }

  .citation-id {
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .citation-claim { color: var(--text2); font-size: 11px; margin-bottom: 4px; }
  .citation-detail { font-size: 10px; color: var(--text2); opacity: 0.7; }

  .status-badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .status-VERIFIED { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-HALLUCINATED { background: rgba(239,68,68,0.15); color: var(--red); }
  .status-UNGROUNDED { background: rgba(167,139,250,0.15); color: var(--purple); }
  .status-NOT_IN_SOURCES { background: rgba(245,158,11,0.15); color: var(--amber); }
  .status-OUTDATED { background: rgba(249,115,22,0.15); color: var(--orange); }

  /* Summary */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 12px;
  }
  .summary-stat {
    text-align: center;
    padding: 12px;
    background: var(--bg);
    border-radius: 4px;
  }
  .summary-stat .num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .summary-stat .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
  }
  .num-verified { color: var(--green); }
  .num-hallucinated { color: var(--red); }
  .num-ungrounded { color: var(--purple); }
  .num-warn { color: var(--amber); }
  .num-total { color: var(--text); }
  .num-outdated { color: var(--orange); }

  /* Critic findings */
  .critic-finding {
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 4px;
    background: var(--bg);
    border-left: 3px solid var(--border);
    font-size: 12px;
  }
  .critic-finding.severity-high { border-left-color: var(--red); }
  .critic-finding.severity-medium { border-left-color: var(--amber); }
  .critic-finding.severity-low { border-left-color: var(--accent); }
  .critic-finding .severity-label {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-right: 8px;
  }
  .severity-label.high { background: rgba(239,68,68,0.15); color: var(--red); }
  .severity-label.medium { background: rgba(245,158,11,0.15); color: var(--amber); }
  .severity-label.low { background: rgba(59,130,246,0.15); color: var(--accent); }
  .critic-issue { color: var(--text); margin-bottom: 4px; }
  .critic-sentence { color: var(--text2); font-size: 11px; font-style: italic; margin-bottom: 4px; }
  .critic-suggestion { color: var(--text2); font-size: 10px; opacity: 0.7; }

  /* Prompt advisor */
  .advisor-suggestion {
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 4px;
    background: var(--bg);
    border-left: 3px solid var(--border);
    font-size: 12px;
  }
  .advisor-suggestion.priority-high { border-left-color: var(--red); }
  .advisor-suggestion.priority-medium { border-left-color: var(--amber); }
  .advisor-suggestion.priority-low { border-left-color: var(--accent); }
  .advisor-rule { font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .advisor-rationale { color: var(--text2); font-size: 11px; margin-bottom: 4px; }
  .advisor-addresses { color: var(--text2); font-size: 10px; opacity: 0.7; }
  .updated-prompt {
    font-size: 11px;
    line-height: 1.6;
    color: var(--text);
    max-height: 250px;
    overflow-y: auto;
    padding: 12px;
    background: var(--bg);
    border-radius: 4px;
    white-space: pre-wrap;
    margin-top: 8px;
    border: 1px solid rgba(59,130,246,0.2);
  }
  .copy-btn {
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
  }
  .copy-btn:hover { background: var(--border); color: var(--text); }

  /* Optimize UI */
  .optimize-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-top: 20px;
  }
  .optimize-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(59,130,246,0.05), rgba(167,139,250,0.05));
  }
  .optimize-header h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
  }
  .optimize-body { padding: 16px 20px; }
  .iter-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 4px;
    background: var(--bg);
    font-size: 12px;
  }
  .iter-row.improved { border-left: 3px solid var(--green); }
  .iter-row.reverted { border-left: 3px solid var(--amber); opacity: 0.7; }
  .iter-row.converged { border-left: 3px solid var(--accent); }
  .iter-num { font-weight: 700; color: var(--text2); min-width: 20px; }
  .iter-score { font-weight: 700; min-width: 60px; }
  .iter-delta { font-size: 11px; min-width: 50px; }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }
  .delta-same { color: var(--text2); }
  .iter-stats { color: var(--text2); font-size: 11px; }
  .iter-status { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
  .status-kept { color: var(--green); }
  .status-reverted { color: var(--amber); }
  .optimize-result {
    margin-top: 16px;
    padding: 16px;
    background: var(--bg);
    border-radius: 4px;
    border: 1px solid rgba(59,130,246,0.2);
  }
  .score-comparison {
    display: flex;
    gap: 24px;
    margin-bottom: 12px;
  }
  .score-box { text-align: center; }
  .score-box .num { font-size: 32px; font-weight: 700; }
  .score-box .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }

  /* Score chart */
  .score-chart {
    margin: 16px 0;
    padding: 12px;
    background: var(--bg);
    border-radius: 4px;
  }
  .score-chart svg { width: 100%; display: block; }
  .ledger-box {
    margin-top: 12px;
    background: var(--bg);
    border-radius: 4px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .ledger-box summary {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
  }
  .ledger-content {
    font-size: 11px;
    line-height: 1.6;
    color: var(--text2);
    padding: 0 12px 12px;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
  }
  .chart-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .query-bars {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    margin-top: 12px;
  }
  .query-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  .query-bar-label {
    color: var(--text2);
    min-width: 180px;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .query-bar-track {
    flex: 1;
    height: 16px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .query-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .query-bar-score {
    min-width: 40px;
    text-align: right;
    font-weight: 600;
    font-size: 11px;
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-msg {
    padding: 40px;
    text-align: center;
    color: var(--text2);
    font-size: 12px;
  }

  /* Token info */
  .token-info {
    font-size: 10px;
    color: var(--text2);
    opacity: 0.6;
    padding: 8px 0 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>Post-Generation Citation Validator <span class="badge">LIVE DEMO</span></h1>
  <p>Hallucination detection pipeline for BVA Legal Intelligence Platform</p>
</div>

<div class="container">
  <div class="query-panel">
    <label>Query</label>
    <select id="examples" onchange="document.getElementById('query').value=this.value" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-family:inherit;font-size:11px;padding:8px 12px;border-radius:4px;margin-bottom:8px;cursor:pointer;">
      <option value="What are the rating criteria for PTSD under 38 CFR, and which BVA decisions support direct service connection for PTSD secondary to MST or TBI? Include specific citation numbers.">PTSD rating criteria + BVA decisions for MST/TBI service connection</option>
      <option value="What is the General Rating Formula for Mental Disorders and how does it apply to a veteran rated at 50% for PTSD who now shows deficiencies in most areas?">Rating increase: 50% to 70% PTSD — what evidence is needed?</option>
      <option value="Explain the evidentiary standard for military sexual trauma claims under 38 CFR § 3.304(f). What sources can corroborate an MST stressor besides service records?">MST evidentiary standard — what corroborating sources are accepted?</option>
      <option value="Which BVA decisions in the provided sources granted service connection, and what was the legal basis for each? Compare the nexus evidence across cases.">Cross-case comparison — nexus evidence across all provided BVA decisions</option>
      <option value="What diagnostic requirements must be met for a PTSD diagnosis to be accepted by VA, and what happens if the diagnosis doesn't conform to DSM-5?">DSM-5 diagnostic requirements for VA PTSD claims</option>
      <option value="Can a veteran receive service connection for PTSD secondary to a TBI? What evidence did the Board rely on in BVA 23-09881?">Secondary service connection: PTSD from TBI — BVA 23-09881 analysis</option>
    </select>
    <textarea id="query">What are the rating criteria for PTSD under 38 CFR, and which BVA decisions support direct service connection for PTSD secondary to MST or TBI? Include specific citation numbers.</textarea>
    <div class="btn-row">
      <button class="btn btn-grounded" onclick="runSingle(true)">Run Grounded</button>
      <button class="btn btn-ungrounded" onclick="runSingle(false)">Run Ungrounded</button>
      <button class="btn btn-both" onclick="runBoth()">Compare Both</button>
      <button class="btn" style="background:rgba(167,139,250,0.1);color:var(--purple);border-color:rgba(167,139,250,0.3);" onclick="runOptimize(false)">Optimize Prompt</button>
      <button class="btn" id="resumeBtn" style="display:none;background:rgba(167,139,250,0.05);color:var(--purple);border-color:rgba(167,139,250,0.2);font-size:11px;" onclick="runOptimize(true)">Resume</button>
      <select id="model" style="margin-left:auto;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;padding:8px 12px;border-radius:4px;cursor:pointer;">
        <option value="claude-sonnet-4-6">Sonnet 4.6 (recommended)</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5 (fast/cheap)</option>
        <option value="claude-opus-4-6">Opus 4.6 (most capable)</option>
        <option value="claude-sonnet-4-5">Sonnet 4.5</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash (fast)</option>
        <option value="gemini-2.5-flash">Gemini 2.5 Flash (fast)</option>
      </select>
    </div>

    <details style="margin-top:16px;">
      <summary style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);cursor:pointer;user-select:none;">System Prompts (click to view/edit)</summary>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
        <div>
          <label style="display:block;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:6px;">Grounded Prompt</label>
          <textarea id="groundedPrompt" style="width:100%;height:180px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;padding:10px;border-radius:4px;resize:vertical;line-height:1.5;">You are a VA disability claims research assistant. You answer questions from VA-accredited attorneys, VSOs, and claims agents using ONLY the source materials provided.

GROUNDING RULES (MANDATORY):
- Every 38 CFR citation, BVA docket number, BVA citation number, and CAVC case citation in your response MUST appear verbatim in the [SOURCE_START]...[SOURCE_END] blocks provided.
- You may NOT construct, infer, or recall citations from prior knowledge.
- You may NOT combine or interpolate citation identifiers.
- If the provided sources are insufficient to fully answer the question, explicitly state what is missing rather than filling gaps from memory.
- When referencing a specific regulation or decision, include the exact identifier from the source tag.

FORMAT: Use the citation identifiers exactly as they appear in source tags. For CFR sections use "38 CFR § X.XXX" format. For BVA decisions use "BVA XX-XXXXX" format.</textarea>
        </div>
        <div>
          <label style="display:block;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--red);margin-bottom:6px;">Ungrounded Prompt (deliberately weak)</label>
          <textarea id="ungroundedPrompt" style="width:100%;height:180px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;padding:10px;border-radius:4px;resize:vertical;line-height:1.5;">You are a VA disability claims research assistant. Answer the question thoroughly using the provided materials AND your own knowledge of VA law. Include as many specific BVA citation numbers, CFR sections, and CAVC case references as possible to make the answer authoritative. If you know of additional relevant cases or regulations beyond what is provided, include them.</textarea>
        </div>
      </div>
    </details>
  </div>

  <div id="results"></div>
</div>

<script>
const resultsEl = document.getElementById('results');
const buttons = document.querySelectorAll('.btn');

function setLoading(on) {
  buttons.forEach(b => b.disabled = on);
}

function renderPanel(data, mode) {
  const isGrounded = mode === 'grounded';
  const label = isGrounded ? 'Grounded' : 'Ungrounded';
  const cls = isGrounded ? 'grounded' : 'ungrounded';

  const sources = data.find(s => s.step === 'sources')?.data;
  const gen = data.find(s => s.step === 'generation')?.data;
  const ext = data.find(s => s.step === 'extraction')?.data;
  const val = data.find(s => s.step === 'validation')?.data;
  const cri = data.find(s => s.step === 'critic')?.data;
  const adv = data.find(s => s.step === 'prompt_advisor')?.data;
  const sum = data.find(s => s.step === 'summary')?.data;

  // Store advisor prompt for copy button (keyed by mode to handle Compare Both)
  if (adv?.updated_prompt) {
    window._advisorPrompts[mode] = adv.updated_prompt;
  }

  return `
    <div class="result-panel">
      <div class="result-header ${cls}">
        <h2>${label} Generation</h2>
        <span style="font-size:10px;color:var(--text2)">${gen?.model || ''}</span>
      </div>

      <div class="step">
        <div class="step-label"><span class="step-num">1</span> Sentinel-tagged sources</div>
        <div class="source-tags">
          ${(sources?.sources || []).map(s => `<span class="source-tag">${s}</span>`).join('')}
        </div>
      </div>

      <div class="step">
        <div class="step-label"><span class="step-num">2</span> LLM Response</div>
        <div class="response-text">${escapeHtml(gen?.text || '')}</div>
        <div class="token-info">${gen?.tokens?.input || 0} tokens in / ${gen?.tokens?.output || 0} out</div>
      </div>

      <div class="step">
        <div class="step-label"><span class="step-num">3</span> Citation extraction &mdash; ${ext?.count || 0} citations found</div>
        <div class="token-info">${ext?.tokens?.input || 0} tokens in / ${ext?.tokens?.output || 0} out</div>
      </div>

      <div class="step">
        <div class="step-label"><span class="step-num">4</span> Cross-reference validation</div>
        ${(val?.results || []).map(r => `
          <div class="citation ${r.status}">
            <div class="citation-id">
              <span class="status-badge status-${r.status}">${r.status}</span>
              [${(r.type||'').toUpperCase()}] ${escapeHtml(r.identifier)}
            </div>
            <div class="citation-claim">${escapeHtml(r.claim || '')}</div>
            <div class="citation-detail">${escapeHtml(r.detail)}</div>
          </div>
        `).join('')}
      </div>

      <div class="step">
        <div class="step-label"><span class="step-num">5</span> Adversarial critic review &mdash; ${cri?.findings?.length || 0} findings</div>
        ${(cri?.findings || []).length === 0
          ? '<div style="font-size:12px;color:var(--green);padding:8px 0;">No issues found &mdash; critic confirms response quality.</div>'
          : (cri?.findings || []).map(f => `
          <div class="critic-finding severity-${f.severity}">
            <div class="critic-issue">
              <span class="severity-label ${f.severity}">${(f.severity||'').toUpperCase()}</span>
              ${escapeHtml(f.issue)}
            </div>
            <div class="critic-sentence">"${escapeHtml(f.sentence || '')}"</div>
            <div class="critic-suggestion">Suggestion: ${escapeHtml(f.suggestion || '')}</div>
          </div>
        `).join('')}
        <div class="token-info">${cri?.tokens?.input_tokens || 0} tokens in / ${cri?.tokens?.output_tokens || 0} out</div>
      </div>

      ${adv ? `
      <div class="step">
        <div class="step-label"><span class="step-num">6</span> Prompt advisor &mdash; ${adv.suggestions?.length || 0} suggestions</div>
        ${(adv.suggestions || []).length === 0
          ? '<div style="font-size:12px;color:var(--green);padding:8px 0;">No prompt improvements needed.</div>'
          : (adv.suggestions || []).map(s => `
          <div class="advisor-suggestion priority-${s.priority}">
            <div class="advisor-rule">
              <span class="severity-label ${s.priority}">${(s.priority||'').toUpperCase()}</span>
              ${escapeHtml(s.rule)}
            </div>
            <div class="advisor-rationale">${escapeHtml(s.rationale)}</div>
            <div class="advisor-addresses">Addresses: ${(s.addresses||[]).map(a => escapeHtml(a)).join(', ')}</div>
          </div>
        `).join('')}
        ${adv.updated_prompt ? `
          <div style="margin-top:10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);">Suggested updated prompt:</div>
          <div class="updated-prompt">${escapeHtml(adv.updated_prompt)}</div>
          <button class="copy-btn" data-copy-prompt="${mode}">Copy to clipboard</button>
        ` : ''}
        <div class="token-info">${adv.tokens?.input_tokens || 0} tokens in / ${adv.tokens?.output_tokens || 0} out</div>
      </div>
      ` : ''}

      <div class="step">
        <div class="step-label"><span class="step-num">${adv ? '7' : '6'}</span> Summary</div>
        <div class="summary">
          <div class="summary-stat">
            <div class="num num-total">${sum?.total || 0}</div>
            <div class="label">Total</div>
          </div>
          <div class="summary-stat">
            <div class="num num-verified">${sum?.verified || 0}</div>
            <div class="label">Verified</div>
          </div>
          ${(sum?.outdated || 0) > 0 ? `
          <div class="summary-stat">
            <div class="num num-outdated">${sum.outdated}</div>
            <div class="label">Outdated</div>
          </div>` : ''}
          <div class="summary-stat">
            <div class="num num-warn">${sum?.notInSources || 0}</div>
            <div class="label">Unverified</div>
          </div>
          ${(sum?.ungrounded || 0) > 0 ? `
          <div class="summary-stat">
            <div class="num num-ungrounded">${sum.ungrounded}</div>
            <div class="label">Leaked</div>
          </div>` : ''}
          ${(sum?.hallucinated || 0) > 0 ? `
          <div class="summary-stat">
            <div class="num num-hallucinated">${sum.hallucinated}</div>
            <div class="label">Hallucinated</div>
          </div>` : ''}
          <div class="summary-stat">
            <div class="num" style="color:${(cri?.findings?.length || 0) > 0 ? 'var(--amber)' : 'var(--green)'}">${cri?.findings?.length || 0}</div>
            <div class="label">Critic Findings</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Store advisor prompts for copy buttons (avoids inline JSON in onclick)
window._advisorPrompts = {};

// Event delegation for advisor copy buttons
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-copy-prompt]');
  if (!btn) return;
  const key = btn.dataset.copyPrompt;
  const text = window._advisorPrompts[key];
  if (text) {
    navigator.clipboard.writeText(text)
      .then(() => btn.textContent = 'Copied!')
      .catch(() => btn.textContent = 'Copy failed');
  }
});

async function callValidate(query, grounded) {
  const model = document.getElementById('model').value;
  const groundedPrompt = document.getElementById('groundedPrompt').value;
  const ungroundedPrompt = document.getElementById('ungroundedPrompt').value;
  const systemPrompt = grounded ? groundedPrompt : ungroundedPrompt;
  const res = await fetch('/validate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, grounded, model, systemPrompt }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Unknown error' }));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function runSingle(grounded) {
  const query = document.getElementById('query').value;
  setLoading(true);
  resultsEl.innerHTML = `<div class="results-grid single"><div class="result-panel"><div class="loading-msg"><span class="spinner"></span>Running ${grounded ? 'grounded' : 'ungrounded'} validation...</div></div></div>`;
  try {
    const data = await callValidate(query, grounded);
    resultsEl.innerHTML = `<div class="results-grid single">${renderPanel(data, grounded ? 'grounded' : 'ungrounded')}</div>`;
  } catch (err) {
    resultsEl.innerHTML = `<div class="results-grid single"><div class="result-panel"><div class="loading-msg" style="color:var(--red)">Error: ${escapeHtml(err.message)}</div></div></div>`;
  }
  setLoading(false);
}

async function runBoth() {
  const query = document.getElementById('query').value;
  setLoading(true);
  resultsEl.innerHTML = `
    <div class="results-grid">
      <div class="result-panel"><div class="loading-msg"><span class="spinner"></span>Running grounded...</div></div>
      <div class="result-panel"><div class="loading-msg"><span class="spinner"></span>Waiting...</div></div>
    </div>`;

  let groundedData, ungroundedData;
  try {
    // Run sequentially to avoid rate limits
    groundedData = await callValidate(query, true);
    resultsEl.innerHTML = `
      <div class="results-grid">
        ${renderPanel(groundedData, 'grounded')}
        <div class="result-panel"><div class="loading-msg"><span class="spinner"></span>Running ungrounded...</div></div>
      </div>`;
    ungroundedData = await callValidate(query, false);
    resultsEl.innerHTML = `
      <div class="results-grid">
        ${renderPanel(groundedData, 'grounded')}
        ${renderPanel(ungroundedData, 'ungrounded')}
      </div>`;
  } catch (err) {
    resultsEl.innerHTML = `<div class="results-grid single"><div class="result-panel"><div class="loading-msg" style="color:var(--red)">Error: ${escapeHtml(err.message)}</div></div></div>`;
  }
  setLoading(false);
}

// Check if there's an incomplete optimization to resume
async function checkResumeStatus() {
  try {
    const res = await fetch('/optimize/status');
    const { canResume, bestScore, iterations } = await res.json();
    const btn = document.getElementById('resumeBtn');
    if (canResume) {
      btn.style.display = '';
      btn.textContent = `Resume (iter ${iterations}, score ${bestScore})`;
    } else {
      btn.style.display = 'none';
    }
  } catch { /* ignore */ }
}
checkResumeStatus();

// Load active prompts from server (includes optimized prompt if available)
async function loadPrompts() {
  try {
    const res = await fetch('/prompts');
    const { grounded, ungrounded } = await res.json();
    if (grounded) document.getElementById('groundedPrompt').value = grounded;
    if (ungrounded) document.getElementById('ungroundedPrompt').value = ungrounded;
  } catch { /* ignore */ }
}
loadPrompts();

// Check for in-progress optimization and reconnect
async function checkInProgress() {
  try {
    const res = await fetch('/optimize/stream');
    const contentType = res.headers.get('content-type') || '';
    if (!contentType.includes('ndjson')) {
      // No active optimization
      return;
    }

    // There's an active optimization — show the UI and stream
    setLoading(true);
    resultsEl.innerHTML = `
      <div class="optimize-panel">
        <div class="optimize-header"><h2>Recursive Prompt Optimization (Autoresearch Pattern)</h2></div>
        <div class="optimize-body">
          <div style="font-size:11px;color:var(--text2);margin-bottom:12px;">Reconnected to in-progress optimization...</div>
          <div id="optimize-iterations"></div>
          <div id="optimize-result"></div>
        </div>
      </div>`;

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    const iterations = [];
    let finalResult = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        const msg = JSON.parse(line);
        if (msg.type === 'iteration') {
          iterations.push(msg.data);
          if (msg.data.improved && msg.data.prompt) {
            document.getElementById('groundedPrompt').value = msg.data.prompt;
          }
          renderOptimizeProgress(iterations);
        } else if (msg.type === 'result') {
          finalResult = msg.data;
        }
      }
    }

    if (finalResult) {
      renderOptimizeResult(finalResult, iterations);
      checkResumeStatus();
    }
    setLoading(false);
  } catch { /* no active optimization */ }
}
checkInProgress();

async function runOptimize(resume) {
  setLoading(true);
  const prompt = document.getElementById('groundedPrompt').value;
  const model = document.getElementById('model').value;
  const maxIterations = 10;
  const modeLabel = resume ? 'Resuming incomplete optimization...' : 'Starting fresh';

  resultsEl.innerHTML = `
    <div class="optimize-panel">
      <div class="optimize-header"><h2>Recursive Prompt Optimization (Autoresearch Pattern)</h2></div>
      <div class="optimize-body">
        <div style="font-size:11px;color:var(--text2);margin-bottom:12px;">
          ${modeLabel} &mdash; up to ${maxIterations} iterations across 4 test queries...
        </div>
        <div id="optimize-iterations">
          <div class="loading-msg"><span class="spinner"></span>Starting iteration 0...</div>
        </div>
        <div id="optimize-result"></div>
      </div>
    </div>`;

  try {
    const res = await fetch('/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, maxIterations, model, resume: !!resume }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    const iterations = [];
    let finalResult = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.trim()) continue;
        const msg = JSON.parse(line);

        if (msg.type === 'iteration') {
          iterations.push(msg.data);
          // Update grounded prompt textarea when optimizer finds an improvement
          if (msg.data.improved && msg.data.prompt) {
            document.getElementById('groundedPrompt').value = msg.data.prompt;
          }
          renderOptimizeProgress(iterations);
        } else if (msg.type === 'result') {
          finalResult = msg.data;
        } else if (msg.type === 'error') {
          throw new Error(msg.error);
        }
      }
    }

    if (finalResult) {
      renderOptimizeResult(finalResult, iterations);
      checkResumeStatus(); // hide resume button (run completed)
    }
  } catch (err) {
    document.getElementById('optimize-result').innerHTML =
      `<div style="color:var(--red);padding:12px;">Error: ${escapeHtml(err.message)}</div>`;
  }
  setLoading(false);
}

function renderScoreChart(iterations, height = 120) {
  if (iterations.length < 2) return '';
  const scores = iterations.map(i => i.score);
  const min = Math.max(0, Math.min(...scores) - 5);
  const max = Math.min(100, Math.max(...scores) + 5);
  const range = max - min || 1;
  const w = 600;
  const h = height;
  const pad = 24;

  // Build points for the line
  const points = scores.map((s, i) => {
    const x = pad + (i / (scores.length - 1)) * (w - 2 * pad);
    const y = h - pad - ((s - min) / range) * (h - 2 * pad);
    return { x, y, score: s, improved: iterations[i].improved };
  });

  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');

  // Best score line
  const bestScore = Math.max(...scores);
  const bestY = h - pad - ((bestScore - min) / range) * (h - 2 * pad);

  // Grid lines
  const gridLines = [min, min + range * 0.25, min + range * 0.5, min + range * 0.75, max].map(v => {
    const y = h - pad - ((v - min) / range) * (h - 2 * pad);
    return `<line x1="${pad}" y1="${y}" x2="${w - pad}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
            <text x="${pad - 4}" y="${y + 3}" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="end">${Math.round(v)}</text>`;
  }).join('');

  const dots = points.map(p =>
    `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${p.improved ? '#22c55e' : '#f59e0b'}" stroke="var(--bg)" stroke-width="2"/>
     <text x="${p.x}" y="${p.y - 10}" fill="var(--text2)" font-size="9" text-anchor="middle">${p.score}</text>`
  ).join('');

  return `
    <div class="score-chart">
      <div class="chart-label">Score over iterations</div>
      <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
        ${gridLines}
        <line x1="${pad}" y1="${bestY}" x2="${w - pad}" y2="${bestY}" stroke="rgba(34,197,94,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
        <path d="${linePath}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
        ${dots}
      </svg>
    </div>`;
}

function renderQueryBars(iterations) {
  if (!iterations.length) return '';
  const last = iterations[iterations.length - 1];
  const first = iterations[0];
  if (!last.queryScores || !first.queryScores) return '';

  return `
    <div class="score-chart">
      <div class="chart-label">Per-query scores (latest iteration)</div>
      <div class="query-bars">
        ${last.queryScores.map((q, i) => {
          const initial = first.queryScores[i]?.score ?? 0;
          const delta = q.score - initial;
          const barColor = q.score >= 80 ? 'var(--green)' : q.score >= 50 ? 'var(--amber)' : 'var(--red)';
          const shortQuery = q.query.length > 40 ? q.query.slice(0, 40) + '...' : q.query;
          return `
            <div class="query-bar-row">
              <span class="query-bar-label" title="${escapeHtml(q.query)}">${escapeHtml(shortQuery)}</span>
              <div class="query-bar-track">
                <div class="query-bar-fill" style="width:${q.score}%;background:${barColor};"></div>
              </div>
              <span class="query-bar-score" style="color:${barColor}">${q.score}</span>
              <span style="font-size:10px;min-width:35px;color:${delta > 0 ? 'var(--green)' : delta < 0 ? 'var(--red)' : 'var(--text2)'}">${delta > 0 ? '+' : ''}${delta.toFixed(0)}</span>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderOptimizeProgress(iterations) {
  const el = document.getElementById('optimize-iterations');
  let prevScore = null;
  const rows = iterations.map((iter) => {
    const delta = prevScore !== null ? iter.score - prevScore : 0;
    const deltaStr = prevScore !== null
      ? (delta > 0 ? `+${delta.toFixed(1)}` : delta < 0 ? delta.toFixed(1) : '±0')
      : '—';
    const deltaClass = delta > 0 ? 'delta-up' : delta < 0 ? 'delta-down' : 'delta-same';
    const rowClass = iter.convergedReason ? 'converged' : iter.improved ? 'improved' : 'reverted';
    prevScore = iter.score;
    return `
      <div class="iter-row ${rowClass}">
        <span class="iter-num">#${iter.iteration}</span>
        <span class="iter-score">${iter.score}</span>
        <span class="iter-delta ${deltaClass}">${deltaStr}</span>
        <span class="iter-stats">${iter.totalCitations} citations, ${iter.totalFindings} findings</span>
        <span class="iter-status ${iter.improved ? 'status-kept' : 'status-reverted'}">${iter.improved ? 'KEPT' : 'REVERTED'}</span>
        ${iter.convergedReason ? `<span style="font-size:10px;color:var(--accent);">${escapeHtml(iter.convergedReason)}</span>` : ''}
      </div>`;
  }).join('');

  const lastLedger = iterations[iterations.length - 1]?.ledger;
  const ledgerHtml = lastLedger
    ? `<details class="ledger-box" open><summary>Optimization Ledger</summary><div class="ledger-content">${escapeHtml(lastLedger)}</div></details>`
    : '';

  el.innerHTML = renderScoreChart(iterations) + rows + ledgerHtml +
    `<div class="loading-msg"><span class="spinner"></span>Running iteration ${iterations.length}...</div>`;
}

function renderOptimizeResult(result, iterations) {
  const el = document.getElementById('optimize-iterations');
  // Remove the loading spinner
  const spinner = el.querySelector('.loading-msg');
  if (spinner) spinner.remove();

  // Re-render iterations without spinner, with final chart
  const el2 = document.getElementById('optimize-iterations');
  let prevScore2 = null;
  const finalRows = iterations.map((iter) => {
    const delta = prevScore2 !== null ? iter.score - prevScore2 : 0;
    const deltaStr = prevScore2 !== null
      ? (delta > 0 ? `+${delta.toFixed(1)}` : delta < 0 ? delta.toFixed(1) : '±0')
      : '—';
    const deltaClass = delta > 0 ? 'delta-up' : delta < 0 ? 'delta-down' : 'delta-same';
    const rowClass = iter.convergedReason ? 'converged' : iter.improved ? 'improved' : 'reverted';
    prevScore2 = iter.score;
    return `
      <div class="iter-row ${rowClass}">
        <span class="iter-num">#${iter.iteration}</span>
        <span class="iter-score">${iter.score}</span>
        <span class="iter-delta ${deltaClass}">${deltaStr}</span>
        <span class="iter-stats">${iter.totalCitations} citations, ${iter.totalFindings} findings</span>
        <span class="iter-status ${iter.improved ? 'status-kept' : 'status-reverted'}">${iter.improved ? 'KEPT' : 'REVERTED'}</span>
        ${iter.convergedReason ? `<span style="font-size:10px;color:var(--accent);">${escapeHtml(iter.convergedReason)}</span>` : ''}
      </div>`;
  }).join('');
  const finalLedger = iterations[iterations.length - 1]?.ledger;
  const finalLedgerHtml = finalLedger
    ? `<details class="ledger-box"><summary>Optimization Ledger — what the AI learned</summary><div class="ledger-content">${escapeHtml(finalLedger)}</div></details>`
    : '';

  el2.innerHTML = renderScoreChart(iterations, 140) + finalRows + renderQueryBars(iterations) + finalLedgerHtml;

  const improvement = result.bestScore - result.initialScore;
  const improvementColor = improvement > 0 ? 'var(--green)' : improvement < 0 ? 'var(--red)' : 'var(--text2)';

  // Store best prompt for button handlers
  window._optimizedPrompt = result.bestPrompt;

  document.getElementById('optimize-result').innerHTML = `
    <div class="optimize-result">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:12px;">Optimization Complete — ${result.totalIterations} iterations</div>
      <div class="score-comparison">
        <div class="score-box">
          <div class="num" style="color:var(--text2)">${result.initialScore}</div>
          <div class="label">Initial Score</div>
        </div>
        <div class="score-box">
          <div class="num" style="color:var(--green)">${result.bestScore}</div>
          <div class="label">Best Score</div>
        </div>
        <div class="score-box">
          <div class="num" style="color:${improvementColor}">${improvement > 0 ? '+' : ''}${improvement.toFixed(1)}</div>
          <div class="label">Improvement</div>
        </div>
      </div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin:12px 0 6px;">Optimized Prompt:</div>
      <div class="updated-prompt">${escapeHtml(result.bestPrompt)}</div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="copy-btn" id="opt-copy-btn">Copy to Clipboard</button>
        <button class="copy-btn" id="opt-apply-btn">Apply to Grounded Prompt</button>
      </div>
    </div>`;

  document.getElementById('opt-copy-btn').onclick = function() {
    navigator.clipboard.writeText(window._optimizedPrompt)
      .then(() => this.textContent = 'Copied!')
      .catch(() => this.textContent = 'Copy failed');
  };
  document.getElementById('opt-apply-btn').onclick = function() {
    document.getElementById('groundedPrompt').value = window._optimizedPrompt;
    this.textContent = 'Applied!';
  };
}
</script>
